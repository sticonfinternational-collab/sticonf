<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>STICONF 2026 Contact Form Submission</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #00b4d8, #7c3aed); color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9f9f9; padding: 20px; border-radius: 0 0 8px 8px; }
        .field { margin-bottom: 15px; }
        .field-label { font-weight: bold; color: #555; }
        .field-value { background: white; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        .message-box { background: white; padding: 15px; border-radius: 4px; border-left: 4px solid #00b4d8; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>STICONF 2026 Contact Form</h1>
            <p>New inquiry received</p>
        </div>
        <div class="content">
            <div class="field">
                <div class="field-label">Name:</div>
                <div class="field-value">{{ name }}</div>
            </div>

            <div class="field">
                <div class="field-label">Email:</div>
                <div class="field-value">{{ email }}</div>
            </div>

            <div class="field">
                <div class="field-label">Subject:</div>
                <div class="field-value">{{ subject }}</div>
            </div>

            {% if organisation %}
            <div class="field">
                <div class="field-label">Organisation:</div>
                <div class="field-value">{{ organisation }}</div>
            </div>
            {% endif %}

            <div class="field">
                <div class="field-label">Message:</div>
                <div class="message-box">{{ message }}</div>
            </div>

            <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">

            <p style="color: #666; font-size: 12px;">
                This message was sent from the STICONF 2026 website contact form.
            </p>
        </div>
    </div>
</body>
</html>

services:
  - type: web
    name: sticonf
    env: python
    pythonVersion: 3.11.4
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput --clear"
    startCommand: "gunicorn sticonf.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DEBUG
        value: "False"
